<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyDog | Double</title>
    <link rel="stylesheet" href="style_double.css">
    <link rel="stylesheet" href="base_style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">LuckyDog</div>

            <div class="balance" id="balic">100.00</div>

            <div class="profile"></div>

            <button class="burger" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
            </button>
        </nav>
    </header>

    <main>
        <div id="overlay" onclick="toggleMenu()"></div>

        <div id="sidebar">
            <button class="close" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
            </button>

            <a href="#">Главная</a>
            <a href="#">Магазин</a>
            <a href="#">Каталог</a>
            <a href="#">Корзина</a>
            <a href="#">Профиль</a>
        </div>

        <div class="game-layout">
            <p id="timer">
                0.00s<br />
                Осталось до начала раунда<br />
            </p>
        </div>
        <div class="bet-layout">
            <div class="enter-bet">
                <button onclick="plusBtnClick()">+</button>
                <input id="bet-value" type="number" value="0" onfocus="this.select();">
                <button onclick="minusBtnClick()">-</button>
            </div>
            <div class="bnts-bet">
                <button onclick="semiBtnClick()">1/2</button>
                <button onclick="allinBtnClick()">ALL IN</button>
                <button onclick="x2BtnClick()">x2</button>
            </div>
            <div class="color-bet">
                <button>
                    0.00<br>
                    2x<br>
                </button>
                <button>
                    0.00<br>
                    14x<br>
                </button>
                <button>
                    0.00<br>
                    2x<br>
                </button>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
