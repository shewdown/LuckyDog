<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyDog | Double</title>
    <link rel="stylesheet" href="style_double.css">
    <link rel="stylesheet" href="base_style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">LuckyDog</div>


            <div class="balance" id="balic">100.00</div>

            <div class="profile"></div>

            <button class="burger" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
            </button>
        </nav>
    </header>

    <main>
        <div id="overlay" onclick="toggleMenu()"></div>

        <div id="sidebar">
            <button class="close" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
            </button>

            <a href="#">Главная</a>
            <a href="#">Магазин</a>
            <a href="#">Каталог</a>
            <a href="#">Корзина</a>
            <a href="#">Профиль</a>
        </div>

        <div class="game-layout">
            <div class="timer-section">
                <div class="time" id="timeDisplay">10.00s</div>
                <div class="label" id="labelDisplay">до начала раунда</div>
            </div>
            
            <div class="wheel-container">
                <div class="arrow" id="arrow">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="#ffce00">
                        <path d="M12 21l-9-12h18z" />
                    </svg>
                </div>

                <div class="wheel-center">
                    <div class="wheel" id="wheel"></div>
                </div>
            </div>
        </div>
        <div class="bet-layout">
            <div class="enter-bet">
                <button onclick="plusBtnClick()">+</button>
                <input id="bet-value" type="number" value="0" onfocus="this.select();">
                <button onclick="minusBtnClick()">-</button>
            </div>
            <div class="bnts-bet">
                <button onclick="semiBtnClick()">1/2</button>
                <button onclick="allinBtnClick()">ALL IN</button>
                <button onclick="x2BtnClick()">x2</button>
            </div>
            <div class="color-bet">
                <button id="bet-blue" onclick="choiseBtnBlue()">
                    0.00<br>
                    2x<br>
                </button>
                <button id="bet-yellow" onclick="choiseBtnYellow()">
                    0.00<br>
                    14x<br>
                </button>
                <button id="bet-green" onclick="choiseBtnGreen()">
                    0.00<br>
                    2x<br>
                </button>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
    <script src="wheel-logic.js"></script>
</body>
</html>
