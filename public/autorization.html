<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyDog | Главная</title>
    <link rel="stylesheet" href="style_base.css">
    <link rel="stylesheet" href="style_autorization.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">LuckyDog</div>


            <div class="balance" id="balic">1000.00</div>

            <div class="profile"></div>

            <button class="burger" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
            </button>
        </nav>
    </header>

    <main>
        <div id="overlay" onclick="toggleMenu()"></div>

        <div id="sidebar">
            <button class="close" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
            </button>

            <!-- Рандомных накидал если что -->
            <a href="#">Главная</a>
            <a href="#">Магазин</a>
            <a href="#">Каталог</a>
            <a href="#">Корзина</a>
            <a href="#">Профиль</a>
        </div>

        <div class="forms-container">
            <form id="formLogin" class="active">
                <div class="title">Вход</div>
                <input type="login" placeholder="Логин" id="auth-login" required>
                <input type="password" placeholder="Пароль" id="auth-pass" required>
                <button type="button" onclick="handleAuth()">Войти</button>
                <div class="text-link">
                    Нет аккаунта? <a onclick="toggleForm()">Регистрация</a>
                </div>
            </form>
        
            <form id="formRegister" class="">
                <div class="title">Регистрация</div>
                <input type="Имя" placeholder="Имя">
                <input type="login" placeholder="Логин *" id="reg-login" required>
                <input type="password" placeholder="Пароль *" id="reg-pass" required>
                <button type="button" onclick="handleRegister()">Зарегистрироваться</button>
                <div class="text-link">
                    Есть аккаунт? <a onclick="toggleForm()">Вход</a>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="script-autorization.js"></script>
</body>
</html>
